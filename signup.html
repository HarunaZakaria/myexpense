<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExpTracker</title>
  </head>
  <body>
    <div class="signup-container">
      <h1>ExpTracker</h1>

      <div class="form">
        <form action="#">
          <div class="full-name">
            <input
              type="text"
              name="fullName"
              required
              placeholder="Enter Your Full Name"
            />
          </div>
          <div class="email">
            <input
              type="email"
              name="email"
              required
              placeholder="Enter Your Email"
            />
          </div>
          <div class="password">
            <input
              type="text"
              name="password"
              required
              placeholder="Password"
            />
          </div>
          <div class="confim-password">
            <input
              type="text"
              name="confirmPassword"
              required
              placeholder="Confirm Password"
            />
          </div>
          <div class="signup-btn">
            <button type="submit" class="signup-btn">Sign p</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>

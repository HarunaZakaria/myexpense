<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <title>My Expense</title>
  </head>
  <body>
    <h1 class="add-exp-header">Add a new expense here</h1>
    <div>
      <form id="expForm">
        <div>
          <input type="text" name="itemName" placeholder="Item Name" required />
        </div>
        <div>
          <input type="number" name="itemPrice" placeholder="Ghc" required />
        </div>
        <div>
          <button type="submit" class="btn btn-outline-primary add">Add</button>
        </div>
        <ul class="list-container"></ul>
      </form>
    </div>

    <section class="footer-section">
      <footer class="footer">
        &copy;Copyright <span class="year"></span> ExpTracker. All rights
        reserved
      </footer>
    </section>
    <script src="js/add.js"></script>
    <!-- bootstrap script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
